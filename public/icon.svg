<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Cream background with subtle rounded corners -->
  <rect width="100" height="100" fill="#FAF7F2" rx="18"/>
  <!-- L letterform: vertical stroke -->
  <rect x="26" y="19" width="13" height="52" fill="#1C4A2E" rx="1"/>
  <!-- L letterform: horizontal foot (the ledger line is the foot of the L) -->
  <rect x="26" y="58" width="48" height="13" fill="#1C4A2E" rx="1"/>
  <!-- Thin ruled line below — extends the ledger concept past the letter -->
  <rect x="16" y="79" width="68" height="1.5" fill="#1C4A2E" opacity="0.25"/>
</svg>
